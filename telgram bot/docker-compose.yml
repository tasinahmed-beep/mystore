version: '3.8'

services:
  t-shop-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: t-shop-telegram-bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - OWNER_CHAT_ID=${OWNER_CHAT_ID}
      - GROUP_NAME=${GROUP_NAME:-T Shop Support}
      - STORE_URL=${STORE_URL:-https://tdigitalstore.web.app}
      - PORT=${PORT:-3001}
      - NODE_ENV=production
    ports:
      - "${PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - t-shop-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  t-shop-network:
    driver: bridge
