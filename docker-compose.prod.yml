version: '3.8'

services:
  t-shop-bot:
    # Use the image built by GitHub Actions
    image: ghcr.io/tasinahmed-beep/mystore/t-shop-bot:latest
    container_name: t-shop-bot
    
    # Environment variables from secrets
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      OWNER_CHAT_ID: ${OWNER_CHAT_ID}
      GROUP_NAME: "T Shop Support"
      STORE_URL: "https://tdigitalstore.web.app"
      PORT: "3001"
    
    # Port mapping
    ports:
      - "3001:3001"
    
    # Auto-restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
